<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emlak İlanları</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #0d6efd;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 15px;
  max-width: 900px;
  margin: auto;
}

form {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: #0d6efd;
  color: white;
  border: none;
  cursor: pointer;
}

.ilan {
  background: white;
  margin-bottom: 15px;
  padding: 10px;
  border-radius: 10px;
}

.ilan img {
  width: 100%;
  border-radius: 10px;
}

@media (min-width: 600px) {
  .ilan {
    display: flex;
    gap: 10px;
  }
  .ilan img {
    width: 200px;
  }
}
</style>
</head>

<body>

<header>
  <h1>Emlak İlanları</h1>
</header>

<div class="container">

<h2>İlan Ekle</h2>

<form id="form">
  <input type="text" id="baslik" placeholder="Başlık" required>
  <textarea id="aciklama" placeholder="Açıklama"></textarea>
  <input type="file" id="foto" required>
  <button>İlan Yükle</button>
</form>

<h2>İlanlar</h2>
<div id="ilanlar"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "API_KEY",
  authDomain: "PROJECT.firebaseapp.com",
  projectId: "PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("form");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = document.getElementById("foto").files[0];

  const data = new FormData();
  data.append("file", file);
  data.append("upload_preset", "UPLOAD_PRESET");
  
  const res = await fetch("https://api.cloudinary.com/v1_1/CLOUD_NAME/image/upload", {
    method: "POST",
    body: data
  });

  const img = await res.json();

  const ilan = {
    baslik: document.getElementById("baslik").value,
    aciklama: document.getElementById("aciklama").value,
    foto: img.secure_url
  };

  await addDoc(collection(db, "ilanlar"), ilan);

  alert("İlan eklendi!");
  form.reset();
  listele();
});

async function listele() {
  const querySnapshot = await getDocs(collection(db, "ilanlar"));
  const div = document.getElementById("ilanlar");
  div.innerHTML = "";

  querySnapshot.forEach(doc => {
    const d = doc.data();
    div.innerHTML += `
      <div class="ilan">
        <img src="${d.foto}">
        <div>
          <h3>${d.baslik}</h3>
          <p>${d.aciklama}</p>
        </div>
      </div>
    `;
  });
}

listele();

</script>

</body>
</html>
